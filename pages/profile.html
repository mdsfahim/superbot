<h2 class="page-title">My Profile</h2>

<div style="display: flex; flex-direction: column; align-items: center; background: var(--surface-light); padding: 30px 20px; border-radius: 16px; margin-bottom: 20px; text-align: center;">
    
    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=duck" alt="Avatar" class="avatar" id="profile-page-avatar" style="width: 85px; height: 85px; margin-bottom: 15px; border-width: 4px;">
    
    <h3 id="profile-page-name" style="margin-bottom: 5px; font-size: 1.4rem;">Loading...</h3>
    <p id="profile-page-id" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px;">ID: ---------</p>
    
    <div id="profile-page-level" style="background: rgba(255, 255, 255, 0.1); padding: 6px 20px; border-radius: 50px; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">
        Loading Level...
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
    <div style="background: var(--surface-color); padding: 20px; border-radius: 16px; text-align: center;">
        <h4 style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px;">Current Balance</h4>
        <p style="color: #ffcc00; font-size: 1.4rem; font-weight: bold;" id="profile-page-balance">0 🪙</p>
    </div>
    <div style="background: var(--surface-color); padding: 20px; border-radius: 16px; text-align: center;">
        <h4 style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px;">Referrals</h4>
        <p style="color: #3b82f6; font-size: 1.4rem; font-weight: bold;" id="profile-page-referrals">0 👥</p>
    </div>
</div>

<div class="profile-menu">
    <div class="task-card" style="cursor: pointer;" onclick="window.openSubPage('history', 'transactions', 'History')">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="font-size: 1.5rem; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">📜</div>
            <h4 style="margin-bottom: 0;">Transaction History</h4>
        </div>
        <ion-icon name="chevron-forward-outline" style="color: var(--text-muted); font-size: 1.2rem;"></ion-icon>
    </div>
    
    <div class="task-card" style="cursor: pointer;" onclick="window.copyReferralLink()">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="font-size: 1.5rem; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">🔗</div>
            <div>
                <h4 style="margin-bottom: 2px;">Invite Friends</h4>
                <p style="color: var(--accent-color); font-size: 0.75rem; font-weight: bold;">Earn 1,000 🪙 per friend</p>
            </div>
        </div>
        <div id="copy-status" style="background: var(--surface-light); color: var(--text-muted); padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; transition: 0.3s;">Copy</div>
    </div>

    <div class="task-card" style="cursor: pointer;" onclick="window.openSupport()">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="font-size: 1.5rem; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">🎧</div>
            <h4 style="margin-bottom: 0;">Support / Help</h4>
        </div>
        <ion-icon name="chevron-forward-outline" style="color: var(--text-muted); font-size: 1.2rem;"></ion-icon>
    </div>
</div>
