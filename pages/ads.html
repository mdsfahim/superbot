<div style="padding: 10px; padding-bottom: 100px;">
    <h2 class="page-title" style="margin-top: 0; margin-bottom: 25px;">Advertise</h2>

    <div style="background: linear-gradient(135deg, rgba(255,149,0,0.15) 0%, rgba(255,149,0,0.02) 100%); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255,149,0,0.2); display: flex; flex-direction: column; gap: 15px;">
        <div>
            <h3 style="color: #ff9500; margin-bottom: 8px;">Promote Your Link 🚀</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.4;">Spend your earned coins to get real users to join your Telegram channel, group, or visit your website.</p>
        </div>
        
        <button onclick="window.openSubPage('payment', 'deposit', 'Add Funds')" style="background: rgba(255, 149, 0, 0.2); color: #ff9500; border: 1px solid rgba(255, 149, 0, 0.4); padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <ion-icon name="wallet-outline" style="font-size: 1.2rem;"></ion-icon> Deposit
        </button>
    </div>

    <div style="background: var(--surface-color); padding: 20px; border-radius: 16px; margin-bottom: 25px;">
        <h4 style="margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;">Create Campaign</h4>
        
        <form id="submit-ad-form" onsubmit="window.submitAdRequest(event)">
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Ad Title</label>
                <input type="text" id="ad-title" required placeholder="e.g. Join my awesome channel!" style="width: 100%; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; outline: none; transition: 0.2s;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Target URL</label>
                <input type="url" id="ad-link" required placeholder="https://t.me/yourlink" style="width: 100%; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; outline: none; transition: 0.2s;">
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <div style="flex: 1;">
                    <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Reward Per User</label>
                    <input type="number" id="ad-reward" required min="10" placeholder="e.g. 50" oninput="window.calculateAdCost()" style="width: 100%; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; outline: none; text-align: center;">
                </div>
                <div style="flex: 1;">
                    <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Desired Clicks</label>
                    <input type="number" id="ad-clicks" required min="10" placeholder="e.g. 100" oninput="window.calculateAdCost()" style="width: 100%; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; outline: none; text-align: center;">
                </div>
            </div>

            <div style="background: rgba(255, 149, 0, 0.05); border: 1px solid rgba(255, 149, 0, 0.2); padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
                <div style="color: var(--text-muted); font-size: 0.85rem;">Total Campaign Cost</div>
                <div id="ad-total-cost" style="font-size: 1.8rem; font-weight: bold; color: #ff9500;">0 🪙</div>
            </div>
            
            <button type="submit" id="ad-submit-btn" style="width: 100%; background: #ff9500; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s;">Submit Campaign</button>
        </form>
    </div>

    <h3 style="font-size: 1.1rem; margin-bottom: 15px; color: var(--text-muted); padding-left: 5px;">My Campaigns</h3>

    <div id="my-campaigns-list">
        <div style="text-align: center; color: var(--text-muted); padding: 30px 20px; background: var(--surface-color); border-radius: 16px;">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">📊</div>
            <p>Loading your campaigns...</p>
        </div>
    </div>
</div>
