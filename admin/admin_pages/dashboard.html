<h2 style="margin-top: 0; margin-bottom: 25px;">Platform Overview</h2>

<div id="sys-status" style="background: rgba(50, 215, 75, 0.1); border: 1px solid var(--success); padding: 15px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; color: var(--success);">
    <ion-icon name="checkmark-circle" style="font-size: 1.5rem;"></ion-icon>
    <div style="flex: 1;">
        <h4 style="margin: 0; margin-bottom: 4px;">System Operational</h4>
        <span style="font-size: 0.85rem; color: var(--text-muted);">Database connection stable. No errors detected.</span>
    </div>
</div>

<div class="responsive-grid">
    
    <div style="background: var(--surface-color); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
            <div style="color: var(--text-muted);">Total Users</div>
            <div style="background: rgba(10, 132, 255, 0.15); color: var(--accent-color); padding: 4px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: bold;" id="dash-active-today">0 Active Today</div>
        </div>
        <div style="font-size: 2.5rem; font-weight: bold; margin-bottom: 15px;" id="dash-total-users">0</div>
        <button onclick="document.querySelectorAll('.nav-btn')[1].click()" style="width: 100%; background: rgba(255,255,255,0.05); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;">Manage Users →</button>
    </div>

    <div style="background: var(--surface-color); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
            <div style="color: var(--text-muted);">Total Economy</div>
            <div style="background: rgba(255, 204, 0, 0.15); color: #ffcc00; padding: 4px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: bold;">Coins Distributed</div>
        </div>
        <div style="font-size: 2.5rem; font-weight: bold; margin-bottom: 15px; color: #ffcc00;" id="dash-total-coins">0 🪙</div>
        <button onclick="document.querySelectorAll('.nav-btn')[3].click()" style="width: 100%; background: rgba(255,255,255,0.05); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;">Manage Store Items (<span id="dash-store-count">0</span>) →</button>
    </div>

    <div style="background: var(--surface-color); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
            <div style="color: var(--text-muted);">Tasks</div>
        </div>
        <div style="font-size: 2.5rem; font-weight: bold; margin-bottom: 15px;" id="dash-tasks-available">0</div>
        <button onclick="document.querySelectorAll('.nav-btn')[2].click()" style="width: 100%; background: rgba(255,255,255,0.05); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;">Add/Manage Tasks →</button>
    </div>

    <div style="background: var(--surface-color); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
            <div style="color: var(--text-muted);">Pending Requests</div>
            <div style="background: rgba(255, 69, 58, 0.15); color: var(--danger); padding: 4px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: bold;" id="dash-pending-badge">0 Needs Action</div>
        </div>
        <div style="font-size: 2.5rem; font-weight: bold; margin-bottom: 15px;" id="dash-withdraw-count">0</div>
        <button onclick="document.querySelectorAll('.nav-btn')[4].click()" style="width: 100%; background: rgba(255,255,255,0.05); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;">Review Submissions →</button>
    </div>

</div>
