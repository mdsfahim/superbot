<div style="padding: 10px; padding-bottom: 100px;">
    <h2 class="page-title" style="margin-top: 0; margin-bottom: 25px;">Add Funds</h2>

    <div style="background: linear-gradient(135deg, rgba(50, 215, 75, 0.15) 0%, rgba(50, 215, 75, 0.02) 100%); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(50, 215, 75, 0.2);">
        <h3 style="color: var(--success); margin-top: 0; margin-bottom: 8px;">Top Up Balance 💳</h3>
        <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.4; margin-bottom: 0;">Select a payment method below, send the funds, and submit your transaction details for approval.</p>
    </div>

    <h4 style="margin-bottom: 15px;">1. Select Payment Method</h4>
    <div id="deposit-methods-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 25px;">
        <div style="text-align: center; color: var(--text-muted); padding: 20px; width: 100%; grid-column: 1 / -1;">Loading methods...</div>
    </div>

    <div id="deposit-form-section" style="display: none; background: var(--surface-color); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);">
        <h4 style="margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;">2. Payment Details</h4>
        
        <div style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
            <div id="deposit-instructions" style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 10px;">Send exactly 1 USD = 1000 Coins to the address below.</div>
            <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;" id="deposit-address-label">Receiver Account / Address</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="deposit-target-address" readonly style="flex-grow: 1; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; outline: none;">
                <button onclick="window.copyDepositAddress()" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer;">Copy</button>
            </div>
        </div>

        <form onsubmit="window.submitDepositRequest(event)">
            <input type="hidden" id="deposit-method-id">
            <input type="hidden" id="deposit-method-name">

            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Amount Sent (Real Money)</label>
                <input type="text" id="deposit-amount-sent" required placeholder="e.g. $10 or 1000 BDT" style="width: 100%; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; outline: none; transition: 0.2s;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Transaction ID / Sender Details</label>
                <input type="text" id="deposit-trx-id" required placeholder="e.g. TXN123456 or Sender Email/Number" style="width: 100%; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; outline: none; transition: 0.2s;">
            </div>
            
            <button type="submit" id="deposit-submit-btn" style="width: 100%; background: var(--success); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s;">Submit for Approval</button>
        </form>
    </div>
</div>
