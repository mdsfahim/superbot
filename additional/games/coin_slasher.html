<div style="position: relative; width: 100%; height: 100%; min-height: 75vh; background: radial-gradient(circle at center, #2a2a35 0%, #0f0f13 100%); border-radius: 20px; overflow: hidden; border: 2px solid rgba(255,255,255,0.05); box-shadow: inset 0 0 30px rgba(0,0,0,0.8); touch-action: none;">
    
    <canvas id="slasher-canvas" style="display: block; width: 100%; height: 100%;"></canvas>

    <div id="slasher-hud" style="position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: center; pointer-events: none;">
        <div style="background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 50px; border: 1px solid rgba(255, 204, 0, 0.3); font-weight: bold; color: #ffcc00;">
            🪙 <span id="slasher-score">0</span> / 20
        </div>
        <div style="background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 50px; border: 1px solid rgba(52, 199, 89, 0.3); font-weight: bold; color: #34c759; font-size: 0.85rem;">
            Prize: <span id="slasher-prize-display">0</span> 🪙
        </div>
    </div>

    <div id="slasher-start-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 20px; text-align: center;">
        <div style="font-size: 4rem; margin-bottom: 10px;">🗡️</div>
        <h2 style="color: white; margin: 0 0 10px 0;">Coin Slasher</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5;">
            Slash <b style="color: #ffcc00;">20 coins</b> to win the prize!<br>
            Avoid the cursed skulls 💀.
        </p>
        <button onclick="window.startSlasherRound()" style="background: var(--accent-color); color: white; border: none; padding: 14px 40px; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);">Ready? Slash!</button>
    </div>

    <div id="slasher-end-overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 20; padding: 20px; text-align: center;">
        <div id="slasher-end-icon" style="font-size: 4rem; margin-bottom: 10px;">💀</div>
        <h2 id="slasher-end-title" style="color: #ff3b30; margin: 0 0 10px 0;">Game Over</h2>
        <p id="slasher-end-text" style="color: var(--text-muted); margin-bottom: 25px;">You hit a cursed skull!</p>
        <button onclick="window.closeSubPage()" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer;">Exit Game</button>
    </div>
</div>
