<div style="padding: 15px; text-align: center; max-width: 400px; margin: 0 auto;">
    
    <div id="ld-balance-display" style="background: rgba(255,204,0,0.1); border: 1px solid rgba(255,204,0,0.3); color: #ffcc00; padding: 12px; border-radius: 12px; font-weight: bold; margin-bottom: 30px;">
        Your Balance: Loading...
    </div>

    <div style="perspective: 1000px; width: 100px; height: 100px; margin: 0 auto 50px;">
        <div id="ld-dice" style="width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 2.5s cubic-bezier(0.1, 0.8, 0.2, 1); transform: rotateX(-15deg) rotateY(15deg);">
            
            <div class="dice-face" style="transform: rotateY(0deg) translateZ(50px);">1</div>
            <div class="dice-face" style="transform: rotateY(90deg) translateZ(50px);">2</div>
            <div class="dice-face" style="transform: rotateY(-90deg) translateZ(50px);">3</div>
            <div class="dice-face" style="transform: rotateX(90deg) translateZ(50px);">4</div>
            <div class="dice-face" style="transform: rotateX(-90deg) translateZ(50px);">5</div>
            <div class="dice-face" style="transform: rotateY(180deg) translateZ(50px);">6</div>
        </div>
    </div>

    <style>
        .dice-face {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffffff, #e0e0e0);
            border: 4px solid #cccccc; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; font-weight: bold; color: #1c1c1e;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
            backface-visibility: hidden;
        }
    </style>

    <h3 style="margin-bottom: 15px; font-size: 1.1rem;">Will it be High or Low?</h3>
    <div style="display: flex; gap: 15px; justify-content: center; margin-bottom: 30px;">
        <button id="btn-low" onclick="window.ld_selectSide('Low')" style="flex: 1; padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.05); color: var(--text-muted); border: 2px solid transparent; font-weight: bold; font-size: 1.05rem; cursor: pointer; transition: 0.2s;">📉 Low (1-3)</button>
        <button id="btn-high" onclick="window.ld_selectSide('High')" style="flex: 1; padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.05); color: var(--text-muted); border: 2px solid transparent; font-weight: bold; font-size: 1.05rem; cursor: pointer; transition: 0.2s;">📈 High (4-6)</button>
    </div>

    <div style="background: var(--surface-color); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <span style="color: var(--text-muted); font-size: 0.9rem;">Cost to play:</span>
            <span style="font-weight: bold;"><span id="ld-fee">--</span> 🪙</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <span style="color: var(--text-muted); font-size: 0.9rem;">Win Reward:</span>
            <span style="color: #32d74b; font-weight: bold;">+<span id="ld-reward">--</span> 🪙</span>
        </div>
        
        <button id="ld-play-btn" onclick="window.ld_playGame()" disabled style="width: 100%; background: var(--accent-color); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 1.05rem; opacity: 0.5; transition: 0.3s;">Select High or Low</button>
    </div>
</div>
