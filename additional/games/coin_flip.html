<div style="padding: 15px; text-align: center; max-width: 400px; margin: 0 auto;">
    
    <div id="cf-balance-display" style="background: rgba(255,204,0,0.1); border: 1px solid rgba(255,204,0,0.3); color: #ffcc00; padding: 12px; border-radius: 12px; font-weight: bold; margin-bottom: 30px;">
        Your Balance: Loading...
    </div>

    <div style="perspective: 1000px; width: 140px; height: 140px; margin: 0 auto 40px;">
        <div id="cf-coin" style="width: 100%; height: 100%; position: relative; transform-style: preserve-3d;">
            <div style="position: absolute; width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #ffcc00, #f7941d); border: 6px solid #d47a00; display: flex; align-items: center; justify-content: center; font-size: 4rem; backface-visibility: hidden; box-shadow: inset 0 0 15px rgba(0,0,0,0.3), 0 10px 20px rgba(0,0,0,0.4);">
                🤑
            </div>
            <div style="position: absolute; width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #e0e0e0, #9e9e9e); border: 6px solid #757575; display: flex; align-items: center; justify-content: center; font-size: 4rem; backface-visibility: hidden; transform: rotateY(180deg); box-shadow: inset 0 0 15px rgba(0,0,0,0.3), 0 10px 20px rgba(0,0,0,0.4);">
                🦅
            </div>
        </div>
    </div>

    <h3 style="margin-bottom: 15px; font-size: 1.1rem;">Choose your side</h3>
    <div style="display: flex; gap: 15px; justify-content: center; margin-bottom: 30px;">
        <button id="btn-heads" onclick="window.cf_selectSide('Heads')" style="flex: 1; padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.05); color: var(--text-muted); border: 2px solid transparent; font-weight: bold; font-size: 1.05rem; cursor: pointer; transition: 0.2s;">🤑 Heads</button>
        <button id="btn-tails" onclick="window.cf_selectSide('Tails')" style="flex: 1; padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.05); color: var(--text-muted); border: 2px solid transparent; font-weight: bold; font-size: 1.05rem; cursor: pointer; transition: 0.2s;">🦅 Tails</button>
    </div>

    <div style="background: var(--surface-color); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <span style="color: var(--text-muted); font-size: 0.9rem;">Cost to play:</span>
            <span style="font-weight: bold;"><span id="cf-fee">--</span> 🪙</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <span style="color: var(--text-muted); font-size: 0.9rem;">Win Reward:</span>
            <span style="color: #32d74b; font-weight: bold;">+<span id="cf-reward">--</span> 🪙</span>
        </div>
        
        <button id="cf-play-btn" onclick="window.cf_playGame()" disabled style="width: 100%; background: var(--accent-color); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 1.05rem; opacity: 0.5; transition: 0.3s;">Select a side to Play</button>
    </div>
</div>
