<div style="position: relative; width: 100%; height: 100%; min-height: 75vh; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid rgba(255,255,255,0.05); box-shadow: inset 0 0 30px rgba(0,0,0,0.8); touch-action: none; display: flex; flex-direction: column;">
    
    <div style="position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 5; pointer-events: none;">
        <div style="color: #ff3b30; font-weight: bold; font-family: monospace; display: flex; align-items: center; gap: 5px;">
            <div id="perfect-rec-dot" style="width: 10px; height: 10px; background: #ff3b30; border-radius: 50%;"></div> REC
        </div>
        <div style="background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; color: #34c759; font-size: 0.85rem;">
            Prize: <span id="perfect-prize-display">0</span> 🪙
        </div>
    </div>

    <canvas id="perfect-canvas" style="flex-grow: 1; width: 100%;"></canvas>

    <div style="height: 120px; background: #111; display: flex; align-items: center; justify-content: center; border-top: 1px solid #222; flex-shrink: 0; z-index: 5;">
        <button id="perfect-shutter-btn" onclick="window.takePerfectShot()" disabled style="width: 75px; height: 75px; border-radius: 50%; background: #fff; border: 4px solid #111; outline: 3px solid #fff; cursor: pointer; transition: transform 0.1s ease;"></button>
    </div>

    <div id="perfect-start-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 20px; text-align: center;">
        <div style="font-size: 4rem; margin-bottom: 10px;">📸</div>
        <h2 style="color: white; margin: 0 0 10px 0;">The Perfect Shot</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5;">
            Tap the shutter when the slider is exactly in the <b style="color: #34c759;">Green Zone</b>.<br>
            <span style="color: #ffcc00;">Yellow Zone</span> returns 40% of the prize.<br>
            <span style="color: #ff3b30;">Red Zone</span> loses your wager!
        </p>
        <button onclick="window.startPerfectRound()" style="background: var(--accent-color); color: white; border: none; padding: 14px 40px; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);">Frame Your Shot</button>
    </div>

    <div id="perfect-end-overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 20; padding: 20px; text-align: center;">
        <div id="perfect-end-icon" style="font-size: 4rem; margin-bottom: 10px;">🎯</div>
        <h2 id="perfect-end-title" style="color: white; margin: 0 0 10px 0; font-size: 1.8rem;">PERFECT!</h2>
        <p id="perfect-end-text" style="color: var(--text-muted); margin-bottom: 25px; font-size: 1.1rem;">Processing Reward...</p>
        <button onclick="window.closeSubPage()" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer;">Exit Studio</button>
    </div>
</div>
